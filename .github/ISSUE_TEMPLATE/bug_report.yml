name: Bug report
description: Report a reproducible CONTRARIA defect
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include the surface, assumption deck, and model seed when relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence that reproduces the issue. Never include confidential evidence.
    validations:
      required: true
